services:
  - type: web
    name: whatsapp-agent-suite
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.0.0
      - key: DATA_DIR
        value: /opt/render/project/src/data
    disk:
      name: whatsapp-sessions
      mountPath: /opt/render/project/src/data
      sizeGB: 1
